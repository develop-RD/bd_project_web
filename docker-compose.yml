version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lab_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lab_planner
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: lab_web
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: lab_planner
      SECRET_KEY: your-super-secret-key-here-change-this-in-production  # Добавьте эту строку
      FLASK_ENV: production

volumes:
  postgres_data: